<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background card -->
  <rect width="256" height="256" rx="20" fill="#1E1E2E"/>
  <!-- Top gold accent stripe -->
  <rect x="0" y="0" width="256" height="6" fill="#D4A843"/>
  <!-- Centered glyph (in gold) -->
  <g transform="translate(128, 128)" fill="#D4A843" stroke="#D4A843">
    
    <!-- Magnifying glass with eye inside -->
    <g fill="none" stroke="#D4A843" stroke-width="8" stroke-linecap="round">
      <circle cx="-12" cy="-12" r="48"/>
      <line x1="22" y1="22" x2="60" y2="60"/>
    </g>
    <!-- Eye inside the lens -->
    <g transform="translate(-12, -12)" fill="none" stroke="#D4A843" stroke-width="4">
      <path d="M -28 0 Q 0 -18 28 0 Q 0 18 -28 0 Z"/>
      <circle cx="0" cy="0" r="8" fill="#D4A843" stroke="none"/>
    </g>
  
  </g>
</svg>