<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background card -->
  <rect width="256" height="256" rx="20" fill="#1E1E2E"/>
  <!-- Top gold accent stripe -->
  <rect x="0" y="0" width="256" height="6" fill="#D4A843"/>
  <!-- Centered glyph (in gold) -->
  <g transform="translate(128, 128)" fill="#D4A843" stroke="#D4A843">
    
    <!-- Group of people silhouettes -->
    <g fill="#D4A843" stroke="none">
      <!-- Center person (larger) -->
      <circle cx="0" cy="-32" r="20"/>
      <path d="M -32 36 Q -32 -2 0 -2 Q 32 -2 32 36 L 32 56 L -32 56 Z"/>
      <!-- Left person -->
      <circle cx="-52" cy="-18" r="14"/>
      <path d="M -76 40 Q -76 10 -52 10 Q -36 10 -32 22 L -32 56 L -76 56 Z"/>
      <!-- Right person -->
      <circle cx="52" cy="-18" r="14"/>
      <path d="M 76 40 Q 76 10 52 10 Q 36 10 32 22 L 32 56 L 76 56 Z"/>
    </g>
  
  </g>
</svg>