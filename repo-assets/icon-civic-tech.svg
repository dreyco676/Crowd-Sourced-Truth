<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background card -->
  <rect width="256" height="256" rx="20" fill="#1E1E2E"/>
  <!-- Top gold accent stripe -->
  <rect x="0" y="0" width="256" height="6" fill="#D4A843"/>
  <!-- Centered glyph (in gold) -->
  <g transform="translate(128, 128)" fill="#D4A843" stroke="#D4A843">
    
    <!-- Building/civic structure with people gear underneath -->
    <g fill="none" stroke="#D4A843" stroke-width="6" stroke-linejoin="round" stroke-linecap="round">
      <!-- Roof -->
      <path d="M -64 -20 L 0 -64 L 64 -20 Z"/>
      <!-- Columns -->
      <line x1="-44" y1="-20" x2="-44" y2="40"/>
      <line x1="-15" y1="-20" x2="-15" y2="40"/>
      <line x1="15" y1="-20" x2="15" y2="40"/>
      <line x1="44" y1="-20" x2="44" y2="40"/>
      <!-- Base -->
      <line x1="-60" y1="40" x2="60" y2="40"/>
      <line x1="-64" y1="52" x2="64" y2="52"/>
    </g>
  
  </g>
</svg>