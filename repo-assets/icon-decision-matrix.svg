<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background card -->
  <rect width="256" height="256" rx="20" fill="#1E1E2E"/>
  <!-- Top gold accent stripe -->
  <rect x="0" y="0" width="256" height="6" fill="#D4A843"/>
  <!-- Centered glyph (in gold) -->
  <g transform="translate(128, 128)" fill="#D4A843" stroke="#D4A843">
    
    <!-- Compass / decision matrix -->
    <g fill="none" stroke="#D4A843" stroke-width="6" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="0" cy="0" r="64"/>
      <!-- N pointer -->
      <path d="M 0 -48 L -14 4 L 0 -8 L 14 4 Z" fill="#D4A843"/>
      <!-- S pointer -->
      <path d="M 0 48 L -14 -4 L 0 8 L 14 -4 Z" fill="#1E1E2E"/>
      <!-- Center pin -->
      <circle cx="0" cy="0" r="6" fill="#D4A843" stroke="none"/>
      <!-- Cardinal marks -->
      <line x1="-64" y1="0" x2="-54" y2="0" stroke-width="4"/>
      <line x1="64" y1="0" x2="54" y2="0" stroke-width="4"/>
      <line x1="0" y1="-64" x2="0" y2="-54" stroke-width="4"/>
      <line x1="0" y1="64" x2="0" y2="54" stroke-width="4"/>
    </g>
  
  </g>
</svg>