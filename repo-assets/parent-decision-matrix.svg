<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <g transform="translate(128, 128)">
    
    <g fill="none" stroke="#D4A843" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <!-- Compass outer circle -->
      <circle cx="0" cy="0" r="68" stroke-width="5"/>
      <!-- Compass inner circle -->
      <circle cx="0" cy="0" r="8" fill="#D4A843" stroke="none"/>
      <!-- Cardinal tick marks -->
      <line x1="0" y1="-68" x2="0" y2="-56"/>
      <line x1="0" y1="68" x2="0" y2="56"/>
      <line x1="-68" y1="0" x2="-56" y2="0"/>
      <line x1="68" y1="0" x2="56" y2="0"/>
      <!-- North needle (gold, filled) -->
      <path d="M 0 -8 L -10 -48 L 0 -40 L 10 -48 Z" fill="#F0C75E" stroke="#F0C75E" stroke-width="2"/>
      <!-- South needle (outline) -->
      <path d="M 0 8 L -10 48 L 0 40 L 10 48 Z" fill="none" stroke="#D4A843" stroke-width="2.5"/>
      <!-- Minor ticks -->
      <line x1="48" y1="-48" x2="42" y2="-42" stroke-width="3"/>
      <line x1="-48" y1="-48" x2="-42" y2="-42" stroke-width="3"/>
      <line x1="48" y1="48" x2="42" y2="42" stroke-width="3"/>
      <line x1="-48" y1="48" x2="-42" y2="42" stroke-width="3"/>
    </g>
  
  </g>
</svg>