<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background card -->
  <rect width="256" height="256" rx="20" fill="#1E1E2E"/>
  <!-- Top gold accent stripe -->
  <rect x="0" y="0" width="256" height="6" fill="#D4A843"/>
  <!-- Centered glyph (in gold) -->
  <g transform="translate(128, 128)" fill="#D4A843" stroke="#D4A843">
    
    <!-- Shield with lock -->
    <g fill="none" stroke="#D4A843" stroke-width="6" stroke-linejoin="round">
      <path d="M 0 -72 L 56 -52 L 56 16 Q 56 56 0 76 Q -56 56 -56 16 L -56 -52 Z" fill="#1E1E2E" stroke="#D4A843" stroke-width="6"/>
    </g>
    <!-- Lock body inside shield -->
    <g fill="#D4A843">
      <rect x="-20" y="-8" width="40" height="32" rx="4"/>
    </g>
    <g fill="none" stroke="#D4A843" stroke-width="5" stroke-linecap="round">
      <path d="M -12 -8 L -12 -22 Q -12 -36 0 -36 Q 12 -36 12 -22 L 12 -8"/>
    </g>
    <!-- Keyhole -->
    <circle cx="0" cy="6" r="4" fill="#1E1E2E"/>
    <rect x="-2" y="6" width="4" height="10" fill="#1E1E2E"/>
  
  </g>
</svg>