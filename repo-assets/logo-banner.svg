<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <rect width="1280" height="320" fill="#12121A"/>
  <rect x="0" y="0" width="1280" height="6" fill="#D4A843"/>
  <!-- Network graph (left) -->
  <g opacity="0.25">
    <line x1="120" y1="100" x2="180" y2="160" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="120" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="240" y2="100" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="240" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="120" y1="100" x2="240" y2="100" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="120" y1="220" x2="240" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="240" y1="100" x2="300" y2="160" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="240" y1="220" x2="300" y2="160" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="60" y1="160" x2="120" y2="100" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="60" y1="160" x2="120" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="300" y1="160" x2="340" y2="120" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="300" y1="160" x2="340" y2="200" stroke="#D4A843" stroke-width="1.5"/>
  </g>
  <g opacity="0.7">
    <circle cx="60" cy="160" r="6" fill="#D4A843"/>
    <circle cx="120" cy="100" r="8" fill="#D4A843"/>
    <circle cx="120" cy="220" r="8" fill="#D4A843"/>
    <circle cx="180" cy="160" r="10" fill="#F0C75E"/>
    <circle cx="240" cy="100" r="7" fill="#D4A843"/>
    <circle cx="240" cy="220" r="7" fill="#D4A843"/>
    <circle cx="300" cy="160" r="9" fill="#D4A843"/>
    <circle cx="340" cy="120" r="5" fill="#D4A843"/>
    <circle cx="340" cy="200" r="5" fill="#D4A843"/>
  </g>
  <!-- Title -->
  <text x="640" y="130" font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="#D4A843" text-anchor="middle" font-weight="bold">Crowd-Sourced Truth</text>
  <text x="640" y="175" font-family="Calibri, Arial, sans-serif" font-size="22" fill="#8B8DA0" text-anchor="middle">A Practitioner's Field Guide to Civic Data Collection</text>
  <!-- Three pillar callouts -->
  <g transform="translate(440, 210)">
    <rect x="0" y="0" width="120" height="36" rx="4" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
    <text x="60" y="24" font-family="Calibri, Arial, sans-serif" font-size="16" fill="#D4A843" text-anchor="middle" font-weight="bold">Speed</text>
  </g>
  <g transform="translate(580, 210)">
    <rect x="0" y="0" width="120" height="36" rx="4" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
    <text x="60" y="24" font-family="Calibri, Arial, sans-serif" font-size="16" fill="#D4A843" text-anchor="middle" font-weight="bold">Safety</text>
  </g>
  <g transform="translate(720, 210)">
    <rect x="0" y="0" width="120" height="36" rx="4" fill="none" stroke="#D4A843" stroke-width="1.5" opacity="0.5"/>
    <text x="60" y="24" font-family="Calibri, Arial, sans-serif" font-size="16" fill="#D4A843" text-anchor="middle" font-weight="bold">Resiliency</text>
  </g>
  <rect x="0" y="314" width="1280" height="6" fill="#D4A843"/>
</svg>