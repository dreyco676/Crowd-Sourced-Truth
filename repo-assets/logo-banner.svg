<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" width="1280" height="320">
  <!-- Background -->
  <rect width="1280" height="320" fill="#12121A"/>

  <!-- Top accent bar -->
  <rect x="0" y="0" width="1280" height="6" fill="#D4A843"/>

  <!-- Decorative network nodes (left side) - representing distributed/crowd-sourced -->
  <g opacity="0.25">
    <!-- Connecting lines -->
    <line x1="120" y1="100" x2="180" y2="160" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="120" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="240" y2="100" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="180" y1="160" x2="240" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="120" y1="100" x2="240" y2="100" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="120" y1="220" x2="240" y2="220" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="240" y1="100" x2="300" y2="160" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="240" y1="220" x2="300" y2="160" stroke="#D4A843" stroke-width="1.5"/>
  </g>
  <g opacity="0.7">
    <circle cx="120" cy="100" r="8" fill="#D4A843"/>
    <circle cx="120" cy="220" r="8" fill="#D4A843"/>
    <circle cx="180" cy="160" r="12" fill="#F0C75E"/>
    <circle cx="240" cy="100" r="8" fill="#D4A843"/>
    <circle cx="240" cy="220" r="8" fill="#D4A843"/>
    <circle cx="300" cy="160" r="8" fill="#D4A843"/>
  </g>

  <!-- Title text -->
  <text x="400" y="135" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#E8E8EC">
    Crowd-Sourced
  </text>
  <text x="400" y="205" font-family="Georgia, serif" font-size="64" font-weight="bold" fill="#D4A843" font-style="italic">
    Truth
  </text>

  <!-- Subtitle accent line -->
  <rect x="400" y="225" width="80" height="2" fill="#D4A843"/>

  <!-- Subtitle -->
  <text x="400" y="255" font-family="Calibri, Arial, sans-serif" font-size="20" fill="#8B8DA0">
    A field guide for community data collection
  </text>

  <!-- Three pillar dots on the right -->
  <g transform="translate(1080, 130)">
    <!-- Speed -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#D4A843" stroke-width="2"/>
    <path d="M -6 -8 L 4 -2 L -2 -2 L 4 8 L -4 2 L 2 2 Z" fill="#D4A843"/>
    <text x="35" y="6" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#E8E8EC" font-weight="bold" letter-spacing="2">SPEED</text>
  </g>
  <g transform="translate(1080, 175)">
    <!-- Safety -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#D4A843" stroke-width="2"/>
    <path d="M 0 -10 L 8 -6 L 8 4 Q 8 9 0 11 Q -8 9 -8 4 L -8 -6 Z" fill="#D4A843"/>
    <text x="35" y="6" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#E8E8EC" font-weight="bold" letter-spacing="2">SAFETY</text>
  </g>
  <g transform="translate(1080, 220)">
    <!-- Resiliency -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="#D4A843" stroke-width="2"/>
    <rect x="-3" y="-8" width="6" height="6" fill="#D4A843"/>
    <rect x="-9" y="3" width="6" height="6" fill="#D4A843"/>
    <rect x="3" y="3" width="6" height="6" fill="#D4A843"/>
    <line x1="0" y1="-2" x2="0" y2="3" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-6" y1="3" x2="6" y2="3" stroke="#D4A843" stroke-width="1.5"/>
    <text x="35" y="6" font-family="Calibri, Arial, sans-serif" font-size="14" fill="#E8E8EC" font-weight="bold" letter-spacing="2">RESILIENCY</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="314" width="1280" height="6" fill="#D4A843"/>
</svg>
